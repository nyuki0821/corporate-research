version: '3.8'

services:
  web:
    build: .
    image: corporate-research:latest
    container_name: corporate-research-web
    ports:
      - "8080:8080"
    environment:
      # Flask settings
      - FLASK_ENV=production
      - PORT=8080
      
      # API Keys (set these in .env file or environment)
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      
      # Google Cloud settings
      - GCP_PROJECT=${GCP_PROJECT}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials/service-account.json
      
      # Processing settings
      - BATCH_SIZE=${BATCH_SIZE:-10}
      - PROCESSING_TIMEOUT=${PROCESSING_TIMEOUT:-30}
      - MAX_RETRIES=${MAX_RETRIES:-3}
      - TAVILY_RATE_LIMIT=${TAVILY_RATE_LIMIT:-60}
      - OPENAI_RATE_LIMIT=${OPENAI_RATE_LIMIT:-60}
    
    volumes:
      # Mount credentials file (optional - for local development)
      - ./credentials:/app/credentials:ro
      
      # Mount logs directory
      - ./logs:/app/logs
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Redis for job queue (for production)
  redis:
    image: redis:7-alpine
    container_name: corporate-research-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

  # Optional: Nginx reverse proxy (for production)
  nginx:
    image: nginx:alpine
    container_name: corporate-research-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    restart: unless-stopped

volumes:
  redis_data: